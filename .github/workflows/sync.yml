name: Hinova Sync

on:
  workflow_dispatch: # Permite rodar manualmente clicando no botão

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests psycopg2-binary

      - name: Run Script
        env:
          # ESSA PARTE É A PONTE. O nome da esquerda é o que o Python lê.
          # O nome da direita (dentro das chaves) deve ser o nome exato que está no painel do GitHub.
          HINOVA_TOKEN_BASE: ${{ secrets.HINOVA_TOKEN_BASE }}
          HINOVA_USUARIO: ${{ secrets.HINOVA_USUARIO }}
          HINOVA_SENHA: ${{ secrets.HINOVA_SENHA }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python sync_veiculos.py
